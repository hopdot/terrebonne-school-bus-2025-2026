name: Nightly Route & Assignment Refresh

on:
  schedule:
    - cron: "0 7 * * *"   # 2:00 AM America/Chicago (CDT, UTC-5)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run nightly assignment refresh
        run: python3 src/nightly_update.py

      - name: Commit updated assignments
        run: |
          git config user.name "terrebonne-bus-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/student_assignments.csv
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Nightly assignment refresh $(date -u +'%Y-%m-%d')"
          git push
